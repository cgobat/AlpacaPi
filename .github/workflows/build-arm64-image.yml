name: Build ARM64 Raspberry Pi image

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-arm64-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-arm64-image:
    name: Build ARM64 image
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 360

    env:
      DEBIAN_FRONTEND: noninteractive
      DOCKER_BUILDKIT: "1"
      BUILDKIT_PROGRESS: plain

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Show runner details
        run: |
          uname -a
          lscpu
          df -h

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache || true
          docker system prune --all --force || true
          df -h

      - name: Install pi-gen dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            arch-test \
            bc \
            binfmt-support \
            bmap-tools \
            ca-certificates \
            coreutils \
            curl \
            debootstrap \
            dosfstools \
            file \
            g++ \
            gcc \
            git \
            grep \
            kmod \
            libarchive-tools \
            libcap2-bin \
            parted \
            pigz \
            qemu-user-static \
            quilt \
            rsync \
            xz-utils \
            zerofree \
            zip

      - name: Prepare Docker and binfmt_misc
        run: |
          sudo systemctl start docker
          sudo modprobe binfmt_misc || true
          sudo mount -t binfmt_misc binfmt_misc /proc/sys/fs/binfmt_misc || true
          docker version

      - name: Patch pi-gen stage layout for this run
        working-directory: alpacapi-builder
        run: |
          set -euxo pipefail
          rm -rf stage-alpacapi
          cp -a stage3 stage-alpacapi
          sed -i "s/STAGE_LIST='stage0 stage1 stage2 stage3'/STAGE_LIST='stage0 stage1 stage2 stage-alpacapi'/" config

          python3 - <<'PY'
          from pathlib import Path

          path = Path("common.sh")
          text = path.read_text()
          old = "cp -Rf config stage2 stage3 ${work_dir}"
          new = "cp -Rf config stage2 stage-alpacapi ${work_dir}"

          if old not in text:
              raise SystemExit(f"Could not find expected line in {path}: {old}")

          path.write_text(text.replace(old, new))
          PY

          cat > stage-alpacapi/prerun.sh <<'EOF'
          #!/bin/bash -e
          copy_previous
          EOF
          chmod +x stage-alpacapi/prerun.sh

          grep -n "STAGE_LIST\|stage-alpacapi\|cp -Rf" config common.sh
          cat stage-alpacapi/prerun.sh

      - name: Build ARM64 image with alpacapi-builder
        working-directory: alpacapi-builder
        run: |
          chmod +x build_arm64.sh common.sh
          ./build_arm64.sh

      - name: List generated images
        if: always()
        run: |
          find alpacapi-builder -maxdepth 1 -type f -name "*-alpacapi-arm64.zip" -print -exec ls -lh {} \;

      - name: Upload ARM64 image artifact
        uses: actions/upload-artifact@v7
        with:
          name: alpacapi-arm64-image
          path: alpacapi-builder/*-alpacapi-arm64.zip
          if-no-files-found: error
          retention-days: 14
